services:
  inline:
    build:
      context: .
      # Enable a database backend (then set INLINE_STORAGE / INLINE_DATABASE_URL):
      # args:
      #   FEATURES: postgres
    image: inline
    container_name: inline
    ports:
      - "8080:8080"
    # Loads your settings (copy .env.example to .env first). Optional.
    env_file:
      - path: .env
        required: false
    environment:
      # Persist queue state on a mounted volume (survives container rebuilds).
      INLINE_DATA_FILE: /app/data/data.json
    volumes:
      # Edit the HTML / config live without rebuilding the image:
      - ./public:/app/public
      - ./config.json:/app/config.json
      # Queue state lives here on the host. The container runs as uid 10001
      # (non-root) — if this directory already exists owned by root from an
      # older deployment, run `chown -R 10001 ./data` once after upgrading.
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "./inline", "healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
